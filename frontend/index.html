<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A premium recurring commute platform for daily travel matching." />
    <meta name="theme-color" content="#1d4ed8" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- OpenGraph & SEO metadata headers -->
    <meta property="og:title" content="Commute Connect - Premium Daily Commuting" />
    <meta property="og:description" content="Premium recurring commute platform matching coordinate pools automatically." />
    <meta name="twitter:card" content="summary_large_image" />
    
    <title>Commute Connect - Premium Daily Commuting</title>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Theme Toggle Initializer script to prevent flashing on page mount -->
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          console.error('Failed to initialize theme settings:', e);
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
